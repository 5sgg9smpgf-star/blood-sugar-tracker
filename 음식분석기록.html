<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>음식 분석 기록</title>
<style>
  @page { size: A4; margin: 10mm; }
  * { box-sizing: border-box; }
  body {
    font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", sans-serif;
    margin: 0; padding: 0; color: #2b2b2b; background: #f4f4f4;
  }
  .page {
    width: 210mm; min-height: 297mm; margin: 0 auto; background: white; padding: 10mm;
  }
  h1.title {
    text-align: center; font-size: 24px; color: #fff;
    background: linear-gradient(135deg, #2E86AB, #1B5E7A);
    padding: 12px; border-radius: 10px; margin: 0 0 6mm 0; letter-spacing: 2px;
  }
  h1.title small { display:block; font-size:13px; font-weight:normal; margin-top:4px; opacity:0.9; }

  .entry {
    border: 2px solid #ddd; border-radius: 10px; padding: 4mm 5mm; margin-bottom: 5mm;
    break-inside: avoid;
  }
  .entry-head {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom: 2mm; font-size: 12px; color:#1B5E7A; font-weight:bold;
  }
  .menu { font-size: 12px; margin-bottom: 2mm; }
  .menu b { color:#2E86AB; }
  .eval-row { display:flex; flex-wrap:wrap; gap: 3mm; margin: 2mm 0; }
  .badge { font-size: 10.5px; padding: 1.5mm 3mm; border-radius: 12px; }
  .badge.good { background:#EAF7EA; color:#2E7D32; }
  .badge.warn { background:#FBF3E4; color:#B8860B; }
  .badge.bad  { background:#FBEAEA; color:#B71C1C; }
  .tip { font-size: 11px; background:#f5f5f5; border-radius:6px; padding:2mm 3mm; margin-top:2mm; }

  .footer-note { text-align:center; font-size:10px; color:#888; margin-top:6mm; }
</style>
</head>
<body>
<div class="page">
  <h1 class="title">🍱 음식 분석 기록
    <small>사진으로 분석한 식사 내용을 모아둔 기록표</small>
  </h1>

  <div id="entries"></div>

  <div class="footer-note">사진을 보내주시면 이 기록표에 계속 추가해 드려요.</div>
</div>

<script>
const entries = [
  {
    date: "2026-07-03",
    meal: "점심 (추정)",
    menu: "잡곡밥, 김치, 계란/야채전, 오렌지, 나물무침, 찌개",
    eval: [
      { type: "good", text: "잡곡밥 - 흰쌀밥보다 혈당 천천히 올림" },
      { type: "good", text: "나물무침·김치 - 식이섬유 좋음" },
      { type: "warn", text: "전(부침) - 기름·밀가루로 혈당 살짝 올릴 수 있음" },
      { type: "warn", text: "오렌지 - 과일 당분, 적당량이면 무난" },
      { type: "warn", text: "찌개 - 국물 나트륨 주의" }
    ],
    tip: "밥은 적당히, 국물은 덜 드시고 나물·김치 먼저 드시면 더 좋아요."
  }
];

const container = document.getElementById('entries');
entries.forEach((e, i) => {
  const div = document.createElement('div');
  div.className = 'entry';
  const badges = e.eval.map(ev => `<span class="badge ${ev.type}">${ev.type==='good'?'👍':'⚠️'} ${ev.text}</span>`).join('');
  div.innerHTML = `
    <div class="entry-head"><span>#${i+1} · ${e.date}</span><span>${e.meal}</span></div>
    <div class="menu"><b>메뉴:</b> ${e.menu}</div>
    <div class="eval-row">${badges}</div>
    <div class="tip">💡 ${e.tip}</div>
  `;
  container.appendChild(div);
});
</script>
</body>
</html>
